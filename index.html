<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Zone-01 School Details Search</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            color: #333;
            font-size: 1.3rem;
            margin: 8px 0;
            font-weight: 700;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 11px;
            color: #666;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 42px;
            height: 22px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #28a745;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #007bff;
            font-size: 16px;
            font-weight: 600;
        }

        .loading::after {
            content: '⏳';
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee;
            border: 2px solid #f88;
            padding: 15px;
            border-radius: 8px;
            color: #c00;
            text-align: center;
            margin: 15px 0;
            font-size: 13px;
        }

        .error-message strong {
            display: block;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .search-box {
            margin-bottom: 15px;
        }

        .search-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 12px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 13px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            color: white;
        }

        .btn-primary {
            background-color: #007bff;
        }

        .btn-primary:active {
            background-color: #0056b3;
            transform: scale(0.98);
        }

        .btn-danger {
            background-color: #dc3545;
        }

        .btn-danger:active {
            background-color: #c82333;
            transform: scale(0.98);
        }

        .btn-success {
            background-color: #28a745;
        }

        .btn-success:active {
            background-color: #218838;
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .school-card {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-left: 5px solid #007bff;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            margin-top: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #007bff;
            color: #007bff;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        /* Grid Layout for Desktop/Tablet */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .info-item {
            background: #fff;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }

        .label {
            font-size: 10px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 3px;
            letter-spacing: 0.3px;
        }

        .value {
            font-size: 13px;
            color: #333;
            word-break: break-word;
            font-weight: 500;
        }

        .value a {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }

        .value a:active {
            color: #0056b3;
            text-decoration: underline;
        }

        .value strong {
            color: #000;
            font-weight: 700;
        }

        .no-results {
            margin-top: 30px;
            text-align: center;
            color: #888;
            padding: 40px 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .no-results::before {
            content: '🔍';
            display: block;
            font-size: 40px;
            margin-bottom: 8px;
        }

        #suggestions {
            margin-top: 8px;
        }

        .suggestion-item {
            padding: 10px;
            background: #fff;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
            font-size: 12px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .suggestion-item:active {
            background: #f0f8ff;
            border-color: #007bff;
            transform: scale(0.99);
        }

        .suggestion-item strong {
            display: block;
            color: #007bff;
            margin-bottom: 2px;
            font-size: 13px;
        }

        .suggestion-item small {
            display: block;
            color: #666;
            font-size: 11px;
        }

        .copy-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 2px solid #e9ecef;
        }

        .copy-btn {
            padding: 12px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 13px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            color: white;
        }

        .copy-basic-btn {
            background-color: #28a745;
        }

        .copy-basic-btn:active {
            background-color: #218838;
            transform: scale(0.98);
        }

        .copy-full-btn {
            background-color: #17a2b8;
        }

        .copy-full-btn:active {
            background-color: #138496;
            transform: scale(0.98);
        }

        .toast {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: toastSlide 0.3s ease-out;
            max-width: 90%;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
        }

        @keyframes toastSlide {
            from {
                transform: translateX(-50%) translateY(80px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* Tablet & Desktop - GRID LAYOUT (OLD STYLE) */
        @media (min-width: 600px) {
            body {
                padding: 20px;
            }

            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .search-box {
                display: flex;
                gap: 10px;
                align-items: flex-start;
            }

            .search-input {
                flex: 1;
                margin-bottom: 0;
            }

            .button-group {
                display: flex;
                flex-shrink: 0;
                width: auto;
            }

            .btn {
                padding: 12px 18px;
                font-size: 14px;
            }

            .school-card {
                padding: 20px;
            }

            .section-title {
                font-size: 15px;
            }

            /* GRID LAYOUT - 3 Columns on Tablet/Desktop */
            .info-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }

            .label {
                font-size: 11px;
            }

            .value {
                font-size: 14px;
            }

            .copy-btn {
                font-size: 14px;
            }

            .toast {
                bottom: 25px;
                right: 25px;
                left: auto;
                transform: translateX(0);
            }

            @keyframes toastSlide {
                from {
                    transform: translateX(300px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        }

        /* Desktop - GRID LAYOUT */
        @media (min-width: 900px) {
            .container {
                padding: 30px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .school-card {
                padding: 25px;
            }

            /* Better grid for wider screens */
            .info-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
        }

        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {
            .btn, .copy-btn, .suggestion-item {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏫 Zone-01 School Details Search</h1>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span id="dataStatus">Loading...</span>
            </div>
            <div class="auto-refresh-toggle">
                <label class="toggle-switch">
                    <input type="checkbox" id="autoRefreshToggle" checked>
                    <span class="slider"></span>
                </label>
                <span>Auto-refresh (5 min)</span>
            </div>
        </div>
        
        <div id="loadingIndicator" class="loading">Connecting to Google Sheets...</div>
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        
        <div id="mainContent" style="display: none;">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" 
                       placeholder="Enter School Code, Institution Name, or Candidate Name" 
                       oninput="suggestSchools()" 
                       onkeypress="handleKeyPress(event)">
                <div class="button-group">
                    <button class="btn btn-primary" onclick="searchSchool()">Search</button>
                    <button class="btn btn-danger" onclick="resetSearch()">Reset</button>
                    <button class="btn btn-success" onclick="refreshData()" id="refreshBtn">🔄 Refresh</button>
                </div>
            </div>
            <div id="suggestions"></div>
            <div id="results"></div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const SPREADSHEET_ID = '1a-J8Xy4V9xDxzciRAEL1BfnDSBUxHqs57zZZBfQ7ZMg';
        const API_KEY = 'AIzaSyCUq2G9jzCG3oX04UD74ogSD1Dda8obb5E';
        const SHEET_NAME = 'school master data';  // ✅ Updated sheet name
        const AUTO_REFRESH_INTERVAL = 5 * 60 * 1000;

        // ===== GLOBAL VARIABLES =====
        let schoolData = [];
        let lastFetchTime = null;
        let autoRefreshTimer = null;

        // ===== FETCH DATA FROM GOOGLE SHEETS =====
        async function fetchGoogleSheetData() {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error.message || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return data.values;
            } catch (error) {
                console.error('Error fetching data:', error);
                throw error;
            }
        }

        // ===== CONVERT SHEET DATA TO JSON =====
        function convertToJSON(sheetData) {
            if (!sheetData || sheetData.length < 2) {
                throw new Error('Sheet is empty or has no data');
            }

            const headers = sheetData[0];
            const rows = sheetData.slice(1);
            
            return rows.map(row => {
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = row[index] || 'NA';
                });
                return obj;
            }).filter(row => {
                return Object.values(row).some(val => val !== 'NA' && val !== '');
            });
        }

        // ===== INITIALIZE APP =====
        async function initializeApp() {
            try {
                document.getElementById('loadingIndicator').style.display = 'block';
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'none';
                updateStatus('Fetching data...', 'loading');
                
                const sheetData = await fetchGoogleSheetData();
                schoolData = convertToJSON(sheetData);
                
                lastFetchTime = new Date();
                updateStatus(`Live • ${schoolData.length} schools loaded`, 'success');
                
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                showToast(`✅ ${schoolData.length} schools loaded!`);
                
                setupAutoRefresh();
                
            } catch (error) {
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
                updateStatus('Connection failed', 'error');
                
                let errorMsg = error.message;
                let suggestions = [];
                
                if (errorMsg.includes('404')) {
                    suggestions.push('Sheet name "school master data" check karo');
                    suggestions.push('Sheet ID verify karo');
                } else if (errorMsg.includes('403')) {
                    suggestions.push('Sheet ko "Anyone with the link" access do');
                } else if (errorMsg.includes('400')) {
                    suggestions.push('API Key check karo');
                }
                
                document.getElementById('errorMessage').innerHTML = `
                    <strong>⚠️ Error loading data</strong><br>
                    <code>${errorMsg}</code><br><br>
                    ${suggestions.length > 0 ? suggestions.map(s => `• ${s}`).join('<br>') : ''}
                    <br><br>
                    <button class="btn btn-success" onclick="initializeApp()">🔄 Try Again</button>
                `;
            }
        }

        // ===== UPDATE STATUS BAR =====
        function updateStatus(message, type = 'success') {
            const statusEl = document.getElementById('dataStatus');
            const dotEl = document.querySelector('.status-dot');
            
            statusEl.textContent = message;
            
            if (type === 'success') {
                dotEl.style.background = '#28a745';
            } else if (type === 'loading') {
                dotEl.style.background = '#ffc107';
            } else if (type === 'error') {
                dotEl.style.background = '#dc3545';
            }
        }

        // ===== AUTO-REFRESH SETUP =====
        function setupAutoRefresh() {
            const toggle = document.getElementById('autoRefreshToggle');
            
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
            
            if (toggle.checked) {
                autoRefreshTimer = setInterval(async () => {
                    console.log('Auto-refreshing data...');
                    await refreshDataSilent();
                }, AUTO_REFRESH_INTERVAL);
            }
        }

        // ===== TOGGLE AUTO-REFRESH =====
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('autoRefreshToggle');
            toggle.addEventListener('change', () => {
                if (toggle.checked) {
                    showToast('🔄 Auto-refresh ON');
                    setupAutoRefresh();
                } else {
                    showToast('⏸️ Auto-refresh OFF');
                    if (autoRefreshTimer) {
                        clearInterval(autoRefreshTimer);
                        autoRefreshTimer = null;
                    }
                }
            });
        });

        // ===== MANUAL REFRESH =====
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳';
            
            try {
                await refreshDataSilent();
                showToast('✅ Refreshed!');
            } catch (error) {
                showToast('❌ Failed', true);
            }
            
            btn.disabled = false;
            btn.innerHTML = '🔄 Refresh';
        }

        // ===== SILENT REFRESH =====
        async function refreshDataSilent() {
            try {
                const sheetData = await fetchGoogleSheetData();
                const newData = convertToJSON(sheetData);
                
                if (JSON.stringify(newData) !== JSON.stringify(schoolData)) {
                    schoolData = newData;
                    lastFetchTime = new Date();
                    updateStatus(`Updated • ${schoolData.length} schools`, 'success');
                    
                    const searchInput = document.getElementById('searchInput').value;
                    if (searchInput.trim()) {
                        searchSchool();
                    }
                }
            } catch (error) {
                console.error('Silent refresh failed:', error);
                throw error;
            }
        }

        // ===== SEARCH FUNCTION =====
        function searchSchool() {
            window.scrollTo({top: 0, behavior: 'smooth'});
            const input = document.getElementById("searchInput").value.trim().toLowerCase();
            const resultsContainer = document.getElementById("results");
            const suggestionBox = document.getElementById("suggestions");
            
            suggestionBox.innerHTML = '';
            
            if (!input) {
                resultsContainer.innerHTML = '';
                return;
            }

            const matches = schoolData.filter(school => {
                return (school["SCHOOL CODE"] || '').toLowerCase().includes(input) ||
                       (school["NAME OF INSTITUTION"] || '').toLowerCase().includes(input) ||
                       (school["NAME OF CANDIDATES"] || '').toLowerCase().includes(input) ||
                       (school["DISTRICT"] || '').toLowerCase().includes(input) ||
                       (school["BLOCK"] || '').toLowerCase().includes(input);
            });

            if (matches.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">No matching school found<br><small>Try different keywords</small></div>';
                return;
            }

            resultsContainer.innerHTML = matches.map((school, index) => `
                <div class="school-card">
                    <div class="section-title">
                        🏫 School Details
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">SCHOOL CODE</div>
                            <div class="value">${school["SCHOOL CODE"] || "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Project Name</div>
                            <div class="value">${school["Project Name"] || "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">UDISE CODE</div>
                            <div class="value">${school["UDISE CODE"] || "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">BLOCK</div>
                            <div class="value">${school["BLOCK"] || "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">DISTRICT</div>
                            <div class="value">${school["DISTRICT"] || "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">NAME OF CC_DEF</div>
                            <div class="value">${school["NAME OF CC_DEF"] || "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">NAME OF INSTITUTION</div>
                            <div class="value"><strong>${school["NAME OF INSTITUTION"] || "NA"}</strong></div>
                        </div>
                        <div class="info-item">
                            <div class="label">NAME OF HEAD MASTER</div>
                            <div class="value">${school["NAME OF HEAD MASTER"] || "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">HEAD MASTER MOBILE NO</div>
                            <div class="value">${school["HEAD MASTER MOBILE NO"] && school["HEAD MASTER MOBILE NO"] !== "NA" ? `<a href="tel:${school["HEAD MASTER MOBILE NO"]}">${school["HEAD MASTER MOBILE NO"]}</a>` : "NA"}</div>
                        </div>
                    </div>

                    <div class="section-title">
                        👤 Candidate Details
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">DATE OF JOINING</div>
                            <div class="value">${school["DATE OF JOINING"] || "NA"}</div>
                        </div>

                        <div class="info-item">
                            <div class="label">NAME OF CANDIDATES</div>
                            <div class="value"><strong>${school["NAME OF CANDIDATES"] || "NA"}</strong></div>
                        </div>
                        <div class="info-item">
                            <div class="label">MOBILE NO.</div>
                            <div class="value">${school["MOBILE NO."] && school["MOBILE NO."] !== "NA" ? `<a href="tel:${school["MOBILE NO."]}">${school["MOBILE NO."]}</a>` : "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">SECONDARY MOBILE NO</div>
                            <div class="value">${school["SECONDARY MOBILE NO"] && school["SECONDARY MOBILE NO"] !== "NA" ? `<a href="tel:${school["SECONDARY MOBILE NO"]}">${school["SECONDARY MOBILE NO"]}</a>` : "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">EMAIL ID</div>
                            <div class="value">${school["EMAIL ID"] && school["EMAIL ID"] !== "NA" ? `<a href="mailto:${school["EMAIL ID"]}">${school["EMAIL ID"]}</a>` : "NA"}</div>
                        </div>
                    </div>

                    <div class="section-title">
                        📍 Location Details
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">Latitude</div>
                            <div class="value">${school["Latitude"] || "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Longitude</div>
                            <div class="value">${school["Longitude"] || "NA"}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Google Map</div>
                            <div class="value">
                                ${school["Google Map Link"] && school["Google Map Link"] !== "NA" 
                                    ? `<a href="${school["Google Map Link"]}" target="_blank">View on Map 🗺️</a>` 
                                    : "NA"}
                            </div>
                        </div>
                    </div>

                    <div class="copy-buttons">
                        <button class="copy-btn copy-basic-btn" onclick="copyBasic(${index})">📋 Copy Basic</button>
                        <button class="copy-btn copy-full-btn" onclick="copyFull(${index})">📄 Copy Full</button>
                    </div>
                </div>
            `).join('');
        }

        // ===== COPY FUNCTIONS =====
        function copyBasic(index) {
            const school = getFilteredSchools()[index];
            const basicText = `
══════════════════════════
🏫 SCHOOL DETAILS
══════════════════════════

SCHOOL CODE: ${school["SCHOOL CODE"] || "NA"}
Project Name: ${school["Project Name"] || "NA"}
UDISE CODE: ${school["UDISE CODE"] || "NA"}
BLOCK: ${school["BLOCK"] || "NA"}
DISTRICT: ${school["DISTRICT"] || "NA"}
NAME OF CC_DEF: ${school["NAME OF CC_DEF"] || "NA"}
NAME OF INSTITUTION: ${school["NAME OF INSTITUTION"] || "NA"}
NAME OF HEAD MASTER: ${school["NAME OF HEAD MASTER"] || "NA"}
HEAD MASTER MOBILE NO: ${school["HEAD MASTER MOBILE NO"] || "NA"}

══════════════════════════
👤 CANDIDATE DETAILS
══════════════════════════

NAME OF CANDIDATES: ${school["NAME OF CANDIDATES"] || "NA"}
MOBILE NO.: ${school["MOBILE NO."] || "NA"}
SECONDARY MOBILE NO: ${school["SECONDARY MOBILE NO"] || "NA"}
EMAIL ID: ${school["EMAIL ID"] || "NA"}
══════════════════════════
            `.trim();

            copyToClipboard(basicText, 'basic');
        }

        function copyFull(index) {
            const school = getFilteredSchools()[index];
            const fullText = `
══════════════════════════
🏫 SCHOOL DETAILS
══════════════════════════

SCHOOL CODE: ${school["SCHOOL CODE"] || "NA"}
Project Name: ${school["Project Name"] || "NA"}
UDISE CODE: ${school["UDISE CODE"] || "NA"}
BLOCK: ${school["BLOCK"] || "NA"}
DISTRICT: ${school["DISTRICT"] || "NA"}
NAME OF CC_DEF: ${school["NAME OF CC_DEF"] || "NA"}
NAME OF INSTITUTION: ${school["NAME OF INSTITUTION"] || "NA"}
NAME OF HEAD MASTER: ${school["NAME OF HEAD MASTER"] || "NA"}
HEAD MASTER MOBILE NO: ${school["HEAD MASTER MOBILE NO"] || "NA"}

══════════════════════════
👤 CANDIDATE DETAILS
══════════════════════════

DATE OF JOINING: ${school["DATE OF JOINING"] || "NA"}

NAME OF CANDIDATES: ${school["NAME OF CANDIDATES"] || "NA"}
MOBILE NO.: ${school["MOBILE NO."] || "NA"}
SECONDARY MOBILE NO: ${school["SECONDARY MOBILE NO"] || "NA"}
EMAIL ID: ${school["EMAIL ID"] || "NA"}

══════════════════════════
📍 LOCATION DETAILS
══════════════════════════

Latitude: ${school["Latitude"] || "NA"}
Longitude: ${school["Longitude"] || "NA"}
Google Map Link: ${school["Google Map Link"] || "NA"}
══════════════════════════
            `.trim();

            copyToClipboard(fullText, 'full');
        }

        function getFilteredSchools() {
            const input = document.getElementById("searchInput").value.trim().toLowerCase();
            return schoolData.filter(school => {
                return (school["SCHOOL CODE"] || '').toLowerCase().includes(input) ||
                       (school["NAME OF INSTITUTION"] || '').toLowerCase().includes(input) ||
                       (school["NAME OF CANDIDATES"] || '').toLowerCase().includes(input) ||
                       (school["DISTRICT"] || '').toLowerCase().includes(input) ||
                       (school["BLOCK"] || '').toLowerCase().includes(input);
            });
        }

        function copyToClipboard(text, type) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast(`✅ ${type === 'basic' ? 'Basic' : 'Full'} copied!`);
                }).catch(err => {
                    fallbackCopy(text, type);
                });
            } else {
                fallbackCopy(text, type);
            }
        }

        function fallbackCopy(text, type) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast(`✅ ${type === 'basic' ? 'Basic' : 'Full'} copied!`);
            } catch (err) {
                showToast('❌ Copy failed', true);
            }
            
            document.body.removeChild(textArea);
        }

        // ===== SUGGESTIONS =====
        function suggestSchools() {
            const input = document.getElementById("searchInput").value.trim().toLowerCase();
            const suggestionBox = document.getElementById("suggestions");

            if (!input) {
                suggestionBox.innerHTML = '';
                return;
            }

            const suggestions = schoolData.filter(school => 
                (school["SCHOOL CODE"] || '').toLowerCase().includes(input) ||
                (school["NAME OF INSTITUTION"] || '').toLowerCase().includes(input) ||
                (school["NAME OF CANDIDATES"] || '').toLowerCase().includes(input) ||
                (school["DISTRICT"] || '').toLowerCase().includes(input) ||
                (school["BLOCK"] || '').toLowerCase().includes(input)
            ).slice(0, 5);

            if (suggestions.length === 0) {
                suggestionBox.innerHTML = '';
                return;
            }

            suggestionBox.innerHTML = suggestions.map(school => 
                `<div class="suggestion-item" onclick="selectSuggestion('${(school["SCHOOL CODE"] || school["NAME OF INSTITUTION"] || '').replace(/'/g, "\\'")}')">
                    <strong>${school["SCHOOL CODE"] || "NA"}</strong>
                    ${school["NAME OF INSTITUTION"] || "NA"}
                    <small>${school["NAME OF CANDIDATES"] && school["NAME OF CANDIDATES"] !== "NA" ? `👤 ${school["NAME OF CANDIDATES"]} • ` : ''}📍 ${school["DISTRICT"] || "NA"}</small>
                </div>`
            ).join('');
        }

        function selectSuggestion(value) {
            document.getElementById("searchInput").value = value;
            document.getElementById("suggestions").innerHTML = '';
            searchSchool();
        }

        // ===== UTILITY FUNCTIONS =====
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                searchSchool();
            }
        }

        function resetSearch() {
            document.getElementById("searchInput").value = '';
            document.getElementById("results").innerHTML = '';
            document.getElementById("suggestions").innerHTML = '';
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            if (isError) toast.style.backgroundColor = '#dc3545';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // ===== INITIALIZE ON PAGE LOAD =====
        window.addEventListener('load', initializeApp);

        window.addEventListener('beforeunload', () => {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
            }
        });
    </script>
</body>
</html>
