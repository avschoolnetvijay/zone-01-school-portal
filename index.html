<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Zone-01 School Details Search Portal - Search and find school information, candidate details, and location data">
    <meta name="theme-color" content="#667eea">
    <title>Zone-01 School Details Search</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-row">
                <h1>🏫 Zone-01 School Details Search</h1>
                <button class="dark-mode-btn" id="darkModeToggle" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span id="dataStatus">Loading...</span>
            </div>
            <div class="auto-refresh-toggle">
                <label class="toggle-switch">
                    <input type="checkbox" id="autoRefreshToggle" checked>
                    <span class="slider"></span>
                </label>
                <span>Auto-refresh (5 min)</span>
            </div>
        </div>
        
        <div id="loadingIndicator" class="loading">Connecting to Google Sheets...</div>
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        
        <div id="mainContent" style="display: none;">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" 
                       placeholder="Enter School Code, Institution Name, or Candidate Name">
                <div class="button-group">
                    <button class="btn btn-primary" id="searchBtn">Search</button>
                    <button class="btn btn-danger" id="resetBtn">Reset</button>
                    <button class="btn btn-success" id="refreshBtn">🔄 Refresh</button>
                </div>
            </div>
            <div id="suggestions"></div>
            <div id="resultCount" class="result-count" style="display: none;"></div>
            <div id="results"></div>
            <div id="loadMoreContainer" class="load-more-container" style="display: none;">
                <button class="btn btn-primary load-more-btn" id="loadMoreBtn">Load More Results</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
